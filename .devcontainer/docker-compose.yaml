services:
  devcontainer:
    container_name: iplocator
    image: localhost/cpp-with-drogon:iplocator
    working_dir: /workspace/project
    user: devuser
    network_mode: "host"
    ipc: host
    tty: true
    stdin_open: true
    privileged: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    env_file:
      - ../service/env/.env
    volumes:
      - $PWD/:/workspace/project
      - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates
      - /etc/ssl/certs:/etc/ssl/certs
      - $HOME/.gitconfig:/workspace/.gitconfig
      - $HOME/.ssh:/workspace/.ssh:ro
      # - $HOME/.bashrc:/workspace/.bashrc
      - $HOME/.claude:/workspace/.claude

  redis:
    container_name: redis-locator
    image: localhost/redis:8.8-m03-alpine3.23
    network_mode: "host"
    tty: true
    stdin_open: true
    privileged: true
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    environment:
      REDIS_PASSWORD: redis-12345
      REDIS_USERNAME: redispassword
    volumes:
      - $PWD/redis/data:/data
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --user
      - "${REDIS_USERNAME}"
      - "on"
      - ">${REDIS_PASSWORD}"
      - "~*"
      - "&*"
      - "+@all"

  mongodb:
    container_name: mongo-locator
    image: localhost/mongo:7.0.28
    network_mode: "host"
    tty: true
    stdin_open: true
    privileged: true
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb
      MONGO_INITDB_ROOT_PASSWORD: mongodb-123
    volumes:
      - $PWD/mongodb/storage/configdb:/data/configdb
      - $PWD/mongodb/storage/db:/data/db

  emqx:
    container_name: emqx-locator
    image: localhost/emqx:5.8.8
    network_mode: host

  redis_insight:
    container_name: redis_insight-locator
    image: redis/redisinsight:2.70.1
    network_mode: "host"
    volumes:
      - $PWD/redis_insight/data:/data
    user: root



