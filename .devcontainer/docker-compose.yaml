services:
  devcontainer:
    container_name: iplocator
    image: localhost/cpp-with-drogon:iplocator
    working_dir: /workspace/project
    user: devuser
    network_mode: "host"
    ipc: host
    tty: true
    stdin_open: true
    privileged: true
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    env_file:
      - ../service/env/.env
    volumes:
      - $PWD/:/workspace/project
      - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates
      - /etc/ssl/certs:/etc/ssl/certs
      - $HOME/.gitconfig:/workspace/.gitconfig
      - $HOME/.ssh:/workspace/.ssh:ro
      # - $HOME/.bashrc:/workspace/.bashrc
      - $HOME/.claude:/workspace/.claude

  redis:
    container_name: redis-locator
    image: localhost/redis:8.8-m03-alpine3.23
    network_mode: "host"
    tty: true
    stdin_open: true
    privileged: true
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    environment:
      REDIS_PASSWORD: redis-12345
      REDIS_USERNAME: redispassword
    volumes:
      - $PWD/redisdb/data:/data
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --user
      - "${REDIS_USERNAME}"
      - "on"
      - ">${REDIS_PASSWORD}"
      - "~*"
      - "&*"
      - "+@all"

  questdb:
    container_name: questdb-locator
    image: localhost/questdb:9.3.5
    network_mode: "host"
    tty: true
    stdin_open: true
    privileged: true
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - ALL
    environment:
      # Auth — QDB_ prefix maps to server.conf keys (dots → underscores)
      - QDB_PG_USER=${QUESTDB_USERNAME}
      - QDB_PG_PASSWORD=${QUESTDB_PASSWORD}
      # Memory (adjust to your machine)
      - JVM_PREPEND=-Xms512m -Xmx2g
      # Workers
      - QDB_SHARED_WORKER_COUNT=2
      - QDB_PG_WORKER_COUNT=1
      - QDB_LINE_TCP_WRITER_WORKER_COUNT=1
    volumes:
      - $PWD/questdb/data:/var/lib/questdb
